name = "qreminder"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[vars]
# 非 secret 配置；secret 用 `wrangler secret put` 设置（见 docs/WORKER_DEPLOY.md §2）。
# 首次部署会自动创建默认 admin（admin@qreminder.local / Qreminder@2026），登录后强制改凭证。
SIGNUP_ENABLED = "false"
SIGNUP_ALLOWLIST = ""
TRUSTED_ORIGINS = ""

[assets]
directory = "../../packages/client/dist"
binding = "ASSETS"

[triggers]
crons = ["* * * * *"]

[[d1_databases]]
binding = "QREMINDER_DB"
database_name = "qreminder"
database_id = "babd00d0-79a6-420f-ba56-43b88598402d"
migrations_dir = "../../packages/server-ts/drizzle"

[[r2_buckets]]
binding = "QREMINDER_ASSETS"
bucket_name = "qreminder-assets"
