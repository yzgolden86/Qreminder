<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Qreminder · 离线</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <style>
      :root {
        color-scheme: dark;
      }
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #0B1119;
        color: #F8FAFC;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      }
      .wrap {
        min-height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 48px 24px;
        text-align: center;
        box-sizing: border-box;
      }
      .icon {
        width: 96px;
        height: 96px;
        margin-bottom: 24px;
        opacity: 0.92;
      }
      h1 {
        font-size: 20px;
        font-weight: 600;
        margin: 0 0 8px;
      }
      p {
        font-size: 14px;
        color: rgba(248, 250, 252, 0.66);
        line-height: 1.6;
        margin: 0 0 24px;
        max-width: 320px;
      }
      button {
        appearance: none;
        border: 1px solid rgba(16, 185, 129, 0.5);
        background: rgba(16, 185, 129, 0.16);
        color: #10B981;
        padding: 10px 20px;
        font-size: 14px;
        font-weight: 500;
        border-radius: 8px;
        cursor: pointer;
        transition: background 0.15s ease;
      }
      button:hover {
        background: rgba(16, 185, 129, 0.24);
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <img class="icon" src="/icons/icon.svg" alt="" />
      <h1>当前处于离线状态</h1>
      <p>Qreminder 需要联网才能加载最新订阅与通知数据。请检查网络连接后重试。</p>
      <button type="button" onclick="location.reload()">重新加载</button>
    </div>
  </body>
</html>
