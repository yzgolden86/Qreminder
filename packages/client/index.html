<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Qreminder</title>
    <meta name="description" content="自托管订阅提醒与支出管理" />
    <meta name="theme-color" content="#0B1119" />
    <meta name="color-scheme" content="dark light" />
    <link id="qreminder-favicon" rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon-180.png" />
    <link rel="apple-touch-icon" href="/icons/icon.svg" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Qreminder" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet" />
    <script>
      (function () {
        try {
          var mode = localStorage.getItem("qreminder_theme_mode") || "dark";
          var prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
          var shouldDark = mode === "dark" || (mode === "system" && prefersDark);
          document.documentElement.classList.toggle("dark", shouldDark);

          var variant = localStorage.getItem("qreminder_theme_variant");
          if (!variant) return;
          if (["emerald", "ocean", "sunset", "lavender", "rose", "custom"].indexOf(variant) === -1) return;

          var root = document.documentElement;
          root.setAttribute("data-theme", variant);

          if (variant !== "custom") return;

          var raw = localStorage.getItem("qreminder_custom_theme_color");
          if (!raw) return;
          var color = JSON.parse(raw);
          if (!color || typeof color !== "object") return;

          var h = color.h, s = color.s, l = color.l;
          if (typeof h !== "number" || typeof s !== "number" || typeof l !== "number") return;
          if (h < 0 || h > 360 || s < 0 || s > 100 || l < 0 || l > 100) return;

          root.style.setProperty("--primary", h + " " + s + "% " + l + "%");
          root.style.setProperty("--primary-glow", h + " " + s + "% " + Math.min(l + 6, 100) + "%");
          root.style.setProperty("--ring", h + " " + s + "% " + l + "%");
          root.style.setProperty("--accent", h + " " + Math.max(s - 30, 20) + "% 20%");
          root.style.setProperty("--accent-foreground", h + " " + s + "% " + Math.min(l + 20, 100) + "%");
          root.style.setProperty("--success", h + " " + s + "% " + l + "%");
          root.style.setProperty("--sidebar-primary", h + " " + s + "% " + l + "%");
          root.style.setProperty("--sidebar-ring", h + " " + s + "% " + l + "%");
        } catch (_e) {
          /* ignore */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
